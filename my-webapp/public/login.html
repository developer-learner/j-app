<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal App - Login</title>

    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.14.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        max-width: 400px;
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      input {
        width: calc(100% - 20px);
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
      }

      .btn {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        font-size: 16px;
        margin-top: 10px;
      }

      .btn:hover {
        background-color: #45a049;
      }

      .link {
        display: block;
        margin-top: 10px;
        font-size: 14px;
        color: #007bff;
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Login to Your Journal</h2>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button id="login-btn" class="btn">Login</button>
      <p id="error-message" style="color: red; display: none;"></p>
      <span id="signup-link" class="link">Don't have an account? Sign Up</span>
      <span id="reset-link" class="link">Forgot your password?</span>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const auth = firebase.auth();
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const signupLink = document.getElementById('signup-link');
        const resetLink = document.getElementById('reset-link');

        // Login function
        loginBtn.onclick = function() {
          const email = emailInput.value;
          const password = passwordInput.value;

          auth.signInWithEmailAndPassword(email, password)
            .then(userCredential => {
              // Successful login
              window.location.href = 'index.html';  // Redirect to the main journal page
            })
            .catch(error => {
              console.error('Error logging in:', error);
              errorMessage.textContent = error.message;
              errorMessage.style.display = 'block';
            });
        };

        // Sign up function
        signupLink.onclick = function() {
          const email = prompt('Enter your email to sign up:');
          const password = prompt('Enter a password:');

          if (email && password) {
            auth.createUserWithEmailAndPassword(email, password)
              .then(userCredential => {
                // Successful sign up
                window.location.href = 'index.html';  // Redirect to the main journal page
              })
              .catch(error => {
                console.error('Error signing up:', error);
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
              });
          }
        };

        // Password reset function
        resetLink.onclick = function() {
          const email = prompt('Enter your email to reset your password:');

          if (email) {
            auth.sendPasswordResetEmail(email)
              .then(() => {
                alert('Password reset email sent!');
              })
              .catch(error => {
                console.error('Error sending password reset email:', error);
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
              });
          }
        };
      });
    </script>
  </body>
</html>
