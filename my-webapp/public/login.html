<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal App - Login</title>

    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.14.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <!-- Link to CSS File -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <h2>Login to Your Journal</h2>
      <div class="auth-form">
        <input type="email" id="email" class="auth-input" placeholder="Email" required autofocus>
        <input type="password" id="password" class="auth-input" placeholder="Password" required>
        <button id="login-btn" class="btn">Login</button>
        <p id="error-message" style="color: red; display: none;"></p>

        <div id="signup-form" style="display: none;">
          <input type="email" id="signup-email" class="auth-input" placeholder="Email" required>
          <input type="password" id="signup-password" class="auth-input" placeholder="Password" required>
          <button id="signup-btn" class="btn">Sign Up</button>
        </div>

        <div id="reset-form" style="display: none;">
          <input type="email" id="reset-email" class="auth-input" placeholder="Enter your email" required>
          <button id="send-reset-btn" class="btn" style="background:#FF7043;">Send Reset Link</button>
          <button id="cancel-reset-btn" class="btn cancel-btn">Cancel</button>
        </div>

        <div class="auth-links">
          <span id="signup-link" class="link">Don't have an account? Sign Up</span>
          <span id="reset-link" class="link">Forgot your password?</span>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const auth = firebase.auth();
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const signupLink = document.getElementById('signup-link');
        const resetLink = document.getElementById('reset-link');
        const signupForm = document.getElementById('signup-form');
        const signupBtn = document.getElementById('signup-btn');
        const signupEmail = document.getElementById('signup-email');
        const signupPassword = document.getElementById('signup-password');
        const resetForm = document.getElementById('reset-form');
        const resetEmail = document.getElementById('reset-email');
        const sendResetBtn = document.getElementById('send-reset-btn');
        const cancelResetBtn = document.getElementById('cancel-reset-btn');

        function setLoading(btn, loading, text, originalText) {
          if (loading) {
            btn.setAttribute('data-text', btn.textContent);
            btn.disabled = true;
            btn.textContent = text || 'Loading...';
          } else {
            btn.disabled = false;
            btn.textContent = originalText || btn.getAttribute('data-text') || text;
          }
        }

        function showError(msg) {
          errorMessage.textContent = msg;
          errorMessage.style.display = 'block';
        }

        function hideError() {
          errorMessage.style.display = 'none';
        }

        // Login function
        loginBtn.onclick = function() {
          const email = emailInput.value;
          const password = passwordInput.value;

          if (!email || !password) { showError('Please fill in both fields.'); return; }
          hideError();
          setLoading(loginBtn, true, 'Logging in...');

          auth.signInWithEmailAndPassword(email, password)
            .then(userCredential => {
              window.location.href = 'index.html';
            })
            .catch(error => {
              console.error('Error logging in:', error);
              showError(error.message);
              setLoading(loginBtn, false, '', 'Login');
            });
        };

        function handleLoginKey(e) {
          if (e.key === 'Enter') loginBtn.click();
        }
        emailInput.addEventListener('keydown', handleLoginKey);
        passwordInput.addEventListener('keydown', handleLoginKey);

        // Toggle signup form visibility
        signupLink.onclick = function() {
          const hidden = signupForm.style.display === 'none';
          signupForm.style.display = hidden ? 'block' : 'none';
          resetForm.style.display = 'none';
          hideError();
          if (hidden) setTimeout(() => signupEmail.focus(), 100);
        };

        // Sign up function
        signupBtn.onclick = function() {
          const email = signupEmail.value;
          const password = signupPassword.value;

          if (!email || !password) { showError('Please fill in both fields.'); return; }
          hideError();
          setLoading(signupBtn, true, 'Signing up...');

          auth.createUserWithEmailAndPassword(email, password)
            .then(userCredential => {
              window.location.href = 'index.html';
            })
            .catch(error => {
              console.error('Error signing up:', error);
              showError(error.message);
              setLoading(signupBtn, false, '', 'Sign Up');
            });
        };

        function handleSignupKey(e) {
          if (e.key === 'Enter') signupBtn.click();
        }
        signupEmail.addEventListener('keydown', handleSignupKey);
        signupPassword.addEventListener('keydown', handleSignupKey);

        // Password reset
        resetLink.onclick = function() {
          resetForm.style.display = 'block';
          signupForm.style.display = 'none';
          hideError();
          resetEmail.value = emailInput.value;
          setTimeout(() => resetEmail.focus(), 100);
        };

        sendResetBtn.onclick = function() {
          const email = resetEmail.value;
          if (!email) { showError('Please enter your email.'); return; }
          hideError();
          setLoading(sendResetBtn, true, 'Sending...');

          auth.sendPasswordResetEmail(email)
            .then(() => {
              setLoading(sendResetBtn, false, 'Send Reset Link');
              resetForm.style.display = 'none';
              showError('Password reset email sent! Check your inbox.');
              errorMessage.style.color = '#2E7D32';
            })
            .catch(error => {
              console.error('Error sending password reset email:', error);
              showError(error.message);
              setLoading(sendResetBtn, false, '', 'Send Reset Link');
            });
        };

        cancelResetBtn.onclick = function() {
          resetForm.style.display = 'none';
          hideError();
          errorMessage.style.color = 'red';
        };

        resetEmail.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') sendResetBtn.click();
        });

        // Auto-focus email field
        emailInput.focus();
      });
    </script>
  </body>
</html>
