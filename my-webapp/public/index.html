<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal App</title>

    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.14.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <!-- Link to CSS File -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <h1>My Journal</h1>
      
      <!-- Theme Toggle Button -->
      <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle">🌗</button> <!-- Added icon here -->
      </div>

      <div class="tabs" id="tabs-container">
        <div id="primary-tab" class="tab active" data-journal="primary">Primary</div>
        <div id="work-tab" class="tab" data-journal="work">Work</div>
        <button id="add-journal-btn" class="add-journal-btn">+</button>
      </div>
      <input type="text" id="search-bar" class="search-bar" placeholder="Search by text or date (e.g., 'Monday, Oct 17')">
      <div id="user-info" style="margin-bottom: 20px;"></div>
      <button id="logout-btn" class="logout-btn" style="display: none;">Log Out</button>
      <div class="entry-container">
        <textarea id="journalEntry" placeholder="Start typing your journal entry..."></textarea>
        <button id="save-btn" class="save-btn"><span class="arrow">&#11014;</span></button>
      </div>
      <ul id="entries" class="entry-list"></ul>
    </div>

    <script>
      let currentJournal = 'primary'; // Default journal

      document.addEventListener('DOMContentLoaded', function () {
        const db = firebase.firestore();
        const themeToggleButton = document.getElementById('theme-toggle');

        // Load user theme from local storage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.body.classList.add(savedTheme);
        }

        // Theme toggle functionality
        themeToggleButton.addEventListener('click', function () {
          // Toggle dark theme class
          document.body.classList.toggle('dark-theme');

          // Check and save the current theme in local storage
          if (document.body.classList.contains('dark-theme')) {
            localStorage.setItem('theme', 'dark-theme');
          } else {
            localStorage.removeItem('theme'); // Default to light theme
          }
        });

        const journalEntry = document.getElementById('journalEntry');
        const saveBtn = document.getElementById('save-btn');
        const addJournalBtn = document.getElementById('add-journal-btn');
        const entriesList = document.getElementById('entries');
        const searchBar = document.getElementById('search-bar');

        // Load user journals (tabs) from Firestore
        function loadUserJournals() {
          db.collection('userJournals').get()
            .then(snapshot => {
              snapshot.forEach(doc => {
                const journalName = doc.data().name;
                createJournalTab(journalName, false); // false because it's loading from DB, not a new tab
              });
              attachTabListeners(); // Reattach listeners after loading tabs
            })
            .catch(error => {
              console.error('Error loading user journals:', error);
            });
        }

        // Attach event listeners for tabs and dynamically created tabs
        function attachTabListeners() {
          document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (event) => {
              if (!event.target.classList.contains('delete-icon')) {
                switchJournal(tab.getAttribute('data-journal'));
              }
            });
          });
        }

        function attachDeleteIconListener(deleteIcon, journalName) {
          deleteIcon.addEventListener('click', (event) => {
            event.stopPropagation(); // Prevent the event from bubbling to the parent tab
            confirmDeleteJournal(journalName);
          });
        }

        function switchJournal(journal) {
          currentJournal = journal;

          const journalChangeEvent = new CustomEvent('journalSwitch', { detail: { currentJournal } });
          window.dispatchEvent(journalChangeEvent);

          console.log(`Switched to journal: ${currentJournal}`);

          document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.toggle('active', tab.getAttribute('data-journal') === journal);
          });

          loadEntries();
        }

        function loadEntries() {
          const collectionName = (currentJournal === 'primary') ? 'journalEntries' : `${currentJournal}JournalEntries`;

          console.log(`Loading entries from collection: ${collectionName}`);

          db.collection(collectionName).orderBy('timestamp', 'desc').get()
            .then(snapshot => {
              entriesList.innerHTML = '';  // Clear previous entries
              if (snapshot.empty) {
                entriesList.innerHTML = '<li>No entries found for this journal.</li>';
                return;
              }

              let previousDate = null;

              snapshot.forEach(doc => {
                const entry = doc.data();
                const entryDate = entry.timestamp.toDate();
                const formattedDate = entryDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });

                if (previousDate !== formattedDate) {
                  const dateBanner = document.createElement('li');
                  dateBanner.className = 'entry-day';
                  dateBanner.textContent = formattedDate;
                  entriesList.appendChild(dateBanner);
                  previousDate = formattedDate;
                }

                const timeString = entryDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true });

                const li = document.createElement('li');
                li.className = 'entry';
                li.innerHTML = `
                  <div class="timestamp">${timeString}</div>
                  <div class="entry-text">${entry.text}</div>
                `;

                addEditDeleteButtons(entryDate, li, doc.id, entry);

                entriesList.appendChild(li);
              });
            })
            .catch(error => {
              console.error('Error loading entries:', error);
              entriesList.innerHTML = '<li>Error loading entries. Please try again later.</li>';
            });
        }

        function addEditDeleteButtons(entryDate, li, entryId, entry) {
          const now = new Date();
          const timeDifference = (now - entryDate) / (1000 * 60); // Time difference in minutes
          if (timeDifference <= 60) {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'actions';

            const editButton = document.createElement('button');
            editButton.className = 'edit-btn';
            editButton.textContent = 'Edit';
            editButton.onclick = () => editEntry(entryId, entry.text);

            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-btn';
            deleteButton.textContent = 'Delete';
            deleteButton.onclick = () => deleteEntry(entryId);

            actionsDiv.appendChild(editButton);
            actionsDiv.appendChild(deleteButton);
            li.appendChild(actionsDiv);
          }
        }

        function editEntry(entryId, currentText) {
          const collectionName = (currentJournal === 'primary') ? 'journalEntries' : `${currentJournal}JournalEntries`;
          const newText = prompt('Edit your entry:', currentText);
          if (newText !== null && newText.trim() !== '') {
            db.collection(collectionName).doc(entryId).update({
              text: newText
            })
            .then(() => {
              console.log('Entry updated!');
              loadEntries();
            })
            .catch(error => {
              console.error('Error updating entry:', error);
            });
          }
        }

        function deleteEntry(entryId) {
          const collectionName = (currentJournal === 'primary') ? 'journalEntries' : `${currentJournal}JournalEntries`;
          if (confirm('Are you sure you want to delete this entry?')) {
            db.collection(collectionName).doc(entryId).delete()
            .then(() => {
              console.log('Entry deleted!');
              loadEntries();
            })
            .catch(error => {
              console.error('Error deleting entry:', error);
            });
          }
        }

        saveBtn.addEventListener('click', () => {
          const text = journalEntry.value.trim();
          if (text === '') {
            alert('Entry cannot be empty.');
            return;
          }

          const timestamp = new Date();
          const collectionName = (currentJournal === 'primary') ? 'journalEntries' : `${currentJournal}JournalEntries`;

          db.collection(collectionName).add({ text, timestamp })
            .then(() => {
              journalEntry.value = '';
              loadEntries();
            })
            .catch(error => {
              console.error('Error saving entry:', error);
            });
        });

        addJournalBtn.addEventListener('click', () => {
          const newJournalName = prompt('Enter a name for the new journal:');
          if (newJournalName) {
            createJournalTab(newJournalName, true);
            switchJournal(newJournalName);

            db.collection('userJournals').doc(newJournalName).set({ name: newJournalName })
              .then(() => {
                console.log(`New journal ${newJournalName} saved to Firestore.`);
              })
              .catch(error => {
                console.error('Error saving new journal:', error);
              });
          }
        });

        function createJournalTab(journalName, isNew) {
          const tab = document.createElement('div');
          tab.classList.add('tab');
          tab.textContent = journalName;
          tab.setAttribute('data-journal', journalName);

          if (journalName !== 'primary' && journalName !== 'work') {
            const deleteIcon = document.createElement('span');
            deleteIcon.classList.add('delete-icon');
            deleteIcon.textContent = '🗑️';
            tab.appendChild(deleteIcon);
            attachDeleteIconListener(deleteIcon, journalName);
          }

          tab.addEventListener('click', (event) => {
            if (!event.target.classList.contains('delete-icon')) {
              switchJournal(journalName);
            }
          });

          addJournalBtn.insertAdjacentElement('beforebegin', tab);

          if (isNew) {
            attachTabListeners();
          }
        }

        function confirmDeleteJournal(journalName) {
          if (confirm(`Are you sure you want to delete the journal "${journalName}"?`)) {
            const journalCollection = `${journalName}JournalEntries`;
            db.collection(journalCollection).get().then(snapshot => {
              snapshot.forEach(doc => {
                db.collection(journalCollection).doc(doc.id).delete()
                  .then(() => console.log(`Deleted entry ${doc.id} from ${journalCollection}`))
                  .catch(error => console.error(`Error deleting entry ${doc.id}:`, error));
              });

              db.collection('userJournals').doc(journalName).delete()
                .then(() => {
                  console.log(`Deleted journal ${journalName} from Firestore`);

                  const tab = document.querySelector(`.tab[data-journal='${journalName}']`);
                  if (tab) {
                    tab.remove();
                  }

                  switchJournal('primary');
                })
                .catch(error => {
                  console.error(`Error deleting journal ${journalName}:`, error);
                });
            });
          }
        }

        loadUserJournals();
        attachTabListeners();
        loadEntries();
      });
    </script>

    <!-- Link to search functionality -->
    <script src="js/search_functionality.js" defer></script>
  </body>
</html>
