<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal App</title>

    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.14.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Link to CSS File -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <div class="header-row">
        <h1>My Journal</h1>
        <div class="toolbar">
          <span id="user-info" style="display: none;"></span>
          <div id="menu-container" class="menu-container" style="display: none;">
            <button id="menu-btn" class="menu-btn">☰</button>
            <div id="dropdown-menu" class="dropdown-menu" style="display: none;">
              <button id="export-btn" class="dropdown-item">⬇️ Export</button>
              <button id="logout-btn" class="dropdown-item">🚪 Log Out</button>
              <div class="dropdown-divider"></div>
               <button id="theme-toggle-item" class="dropdown-item">☀️ Light Mode</button>
            </div>
          </div>
        </div>
      </div>

      <div id="stats-bar" style="display:none;">
        <div class="stat"><span class="stat-icon">📊</span><span class="stat-value" id="total-entries">0</span><span class="stat-label">entries</span></div>
        <div class="stat"><span class="stat-icon">🔥</span><span class="stat-value" id="streak-count">0</span><span class="stat-label">day streak</span></div>
      </div>

      <div class="tabs" id="tabs-container">
        <div id="primary-tab" class="tab active" data-journal="primary" draggable="true" title="Primary">Primary</div>
        <div id="work-tab" class="tab" data-journal="work" draggable="true" title="Work">Work</div>
        <button id="add-journal-btn" class="add-journal-btn">+</button>
        <button id="delete-journal-btn" class="delete-journal-btn">🗑️</button>
      </div>
      <div id="new-journal-form" class="new-journal-form" style="display: none;">
        <input type="text" id="new-journal-input" placeholder="Journal name..." maxlength="30">
        <button id="create-journal-btn" class="edit-save-btn">Create</button>
        <button id="cancel-journal-btn" class="edit-cancel-btn">Cancel</button>
      </div>
      <div class="search-row">
        <input type="text" id="search-bar" class="search-bar" placeholder="Search entries...">
        <input type="date" id="date-filter" class="date-filter">
      </div>
      <div class="entry-container">
        <textarea id="journalEntry" placeholder="Start typing your journal entry..." rows="4"></textarea>
        <button id="save-btn" class="save-btn"><span class="arrow">&#11014;</span></button>
      </div>
      <div id="char-counter">0 characters</div>
      <div class="entries-section">
        <div class="section-divider"></div>
        <ul id="entries" class="entry-list"></ul>
      </div>
    </div>

    <script>
      function showToast(message, type) {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type || 'info'}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      function renderMarkdown(text) {
        const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        let preBlocks = [];
        const noPre = escaped.replace(/```([\s\S]*?)```/g, (match, content) => {
          const id = `\x00PRE${preBlocks.length}\x00`;
          preBlocks.push(`<pre><code>${content}</code></pre>`);
          return id;
        });

        const processed = noPre
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/^### (.+)$/gm, '<h4>$1</h4>')
          .replace(/^## (.+)$/gm, '<h3>$1</h3>')
          .replace(/^# (.+)$/gm, '<h2>$1</h2>')
          .replace(/^- (.+)$/gm, '<li>$1</li>')
          .replace(/\n/g, '<br>');

        const withLists = processed.replace(/(?:<li>[\s\S]*?<\/li>(?:<br>)?)+/g, '<ul>$&</ul>');
        return withLists.replace(/\x00PRE(\d+)\x00/g, (_, i) => preBlocks[parseInt(i)]);
      }

      document.addEventListener('DOMContentLoaded', function () {
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentJournal = 'primary';
        let existingJournals = ['primary', 'work'];
        let userThemeDoc;
        let currentUserUid;

        const themeToggleButton = document.getElementById('theme-toggle-item');
        const deleteJournalBtn = document.getElementById('delete-journal-btn');
        const addJournalBtn = document.getElementById('add-journal-btn');
        const saveBtn = document.getElementById('save-btn');
        const journalEntry = document.getElementById('journalEntry');
        const entriesList = document.getElementById('entries');
        const dateFilter = document.getElementById('date-filter');
        const charCounter = document.getElementById('char-counter');

        function autoResize() {
          journalEntry.style.height = 'auto';
          journalEntry.style.height = journalEntry.scrollHeight + 'px';
        }

        journalEntry.addEventListener('input', () => {
          autoResize();
          charCounter.textContent = `${journalEntry.value.length} characters`;
        });

        let authHandled = false;
        auth.onAuthStateChanged(user => {
          if (authHandled) return;
          authHandled = true;
          if (user) {
            currentUserUid = user.uid;
            userThemeDoc = db.collection('userPreferences').doc(user.uid);
            const themePromise = userThemeDoc.get().then(doc => {
              const savedTheme = doc.exists && doc.data().theme ? doc.data().theme : 'light-theme';
              document.body.classList.add(savedTheme);
              themeToggleButton.textContent = savedTheme === 'dark-theme' ? '🌙 Dark Mode' : '☀️ Light Mode';
            });
            document.getElementById('stats-bar').style.display = 'flex';
            document.getElementById('user-info').textContent = user.email;
            document.getElementById('user-info').style.display = 'inline';
            document.getElementById('menu-container').style.display = 'flex';
            loadUserJournals().then(() => {
              return Promise.all([restoreTabOrder(), themePromise]);
            }).then(() => {
              assignTabColors();
              switchJournal('primary');
            });
          } else {
            document.body.classList.add('light-theme');
            window.location.href = 'login.html';
          }
        });

        themeToggleButton.addEventListener('click', () => {
          if (!userThemeDoc) return;
          if (document.body.classList.contains('dark-theme')) {
            document.body.classList.replace('dark-theme', 'light-theme');
            themeToggleButton.textContent = '☀️ Light Mode';
            userThemeDoc.set({ theme: 'light-theme' }, { merge: true });
          } else {
            document.body.classList.replace('light-theme', 'dark-theme');
            themeToggleButton.textContent = '🌙 Dark Mode';
            userThemeDoc.set({ theme: 'dark-theme' }, { merge: true });
          }
          assignTabColors();
        });

        document.getElementById('export-btn').addEventListener('click', () => {
          document.getElementById('dropdown-menu').style.display = 'none';
          exportEntries();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
          auth.signOut().then(() => {
            window.location.href = 'login.html';
          });
        });

        function switchJournal(journal) {
          currentJournal = journal;
          dateFilter.value = '';

          document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.toggle('active', tab.getAttribute('data-journal') === journal);
          });

          const journalChangeEvent = new CustomEvent('journalSwitch', { detail: { currentJournal } });
          window.dispatchEvent(journalChangeEvent);

          loadEntries();
        }

        function toLocalDateStr(date) {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const d = String(date.getDate()).padStart(2, '0');
          return `${y}-${m}-${d}`;
        }

        function loadEntries() {
          const collectionName = getCollectionName(currentJournal);

          db.collection(collectionName).where('userId', '==', currentUserUid).get()
            .then(snapshot => {
              entriesList.innerHTML = '';

              let entryCount = 0;
              const uniqueDates = new Set();
              const filterDate = dateFilter.value;

              snapshot.forEach(doc => {
                const entry = doc.data();
                const entryDate = entry.timestamp.toDate();
                const dateStr = toLocalDateStr(entryDate);
                if (!filterDate) uniqueDates.add(dateStr);
                entryCount++;
              });

              let streak = 0;
              if (!filterDate) {
                const today = new Date();
                const sorted = [...uniqueDates].sort().reverse();
                for (let i = 0; i < sorted.length; i++) {
                  const expected = new Date(today);
                  expected.setDate(expected.getDate() - i);
                  const expectedStr = toLocalDateStr(expected);
                  if (sorted[i] === expectedStr) {
                    streak++;
                  } else {
                    break;
                  }
                }
              }

              document.getElementById('total-entries').textContent = entryCount;
              document.getElementById('streak-count').textContent = streak;

              if (snapshot.empty) {
                entriesList.innerHTML = '<li class="empty-state"><div class="empty-icon">📝</div><p>No entries yet. Start writing above!</p></li>';
                return;
              }

              const docs = [];
              snapshot.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));
              docs.sort((a, b) => {
                if (a.data.pinned && !b.data.pinned) return -1;
                if (!a.data.pinned && b.data.pinned) return 1;
                return (b.data.timestamp?.toDate() || 0) - (a.data.timestamp?.toDate() || 0);
              });

              let previousDate = null;

              docs.forEach(({ id, data: entry }) => {
                const entryDate = entry.timestamp.toDate();
                const entryDateStr = toLocalDateStr(entryDate);
                if (filterDate && entryDateStr !== filterDate) return;
                const formattedDate = entryDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });

                if (formattedDate !== previousDate) {
                  const dateBanner = document.createElement('li');
                  dateBanner.className = 'entry-day';
                  dateBanner.textContent = formattedDate;
                  entriesList.appendChild(dateBanner);
                  previousDate = formattedDate;
                }

                const timeString = `${entryDate.getHours().toString().padStart(2, '0')}:${entryDate.getMinutes().toString().padStart(2, '0')}`;

                const li = document.createElement('li');
                li.className = `entry${entry.pinned ? ' pinned' : ''}`;
                li.innerHTML = `
                  ${entry.pinned ? '<div class="entry-pin">📍</div>' : ''}
                  <div class="timestamp">${timeString}</div>
                  <div class="entry-text">${renderMarkdown(entry.text)}</div>
                `;

                addEditDeleteButtons(entryDate, li, id, entry);
                entriesList.appendChild(li);
              });
            })
            .catch(error => {
              console.error('Error loading entries:', error);
              entriesList.innerHTML = '<li>Error loading entries. Please try again later.</li>';
            });
        }

        function addEditDeleteButtons(entryDate, li, entryId, entry) {
          const now = new Date();
          const timeDifference = (now - entryDate) / (1000 * 60);
          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'actions';

          const pinButton = document.createElement('button');
          pinButton.className = 'pin-btn';
          pinButton.innerHTML = entry.pinned ? '📍' : '📌';
          pinButton.title = entry.pinned ? 'Unpin' : 'Pin to top';
          pinButton.onclick = () => togglePin(entryId, !entry.pinned);
          actionsDiv.appendChild(pinButton);

          if (timeDifference <= 60) {
            const editButton = document.createElement('button');
            editButton.className = 'edit-btn';
            editButton.innerHTML = '✏️';
            editButton.title = 'Edit';
            editButton.onclick = () => editEntry(entryId, entry.text, li);

            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-btn';
            deleteButton.innerHTML = '🗑️';
            deleteButton.title = 'Delete';
            deleteButton.onclick = () => deleteEntry(entryId);

            actionsDiv.appendChild(editButton);
            actionsDiv.appendChild(deleteButton);
          }

          li.appendChild(actionsDiv);
        }

        function editEntry(entryId, currentText, li) {
          const textDiv = li.querySelector('.entry-text');
          if (!textDiv || li.querySelector('.edit-textarea')) return;

          const textarea = document.createElement('textarea');
          textarea.className = 'edit-textarea';
          textarea.value = currentText;

          const saveBtn = document.createElement('button');
          saveBtn.className = 'edit-save-btn';
          saveBtn.textContent = 'Save';

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'edit-cancel-btn';
          cancelBtn.textContent = 'Cancel';

          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'edit-actions';
          actionsDiv.appendChild(saveBtn);
          actionsDiv.appendChild(cancelBtn);

          textDiv.classList.add('hidden');
          textDiv.insertAdjacentElement('afterend', textarea);
          textarea.insertAdjacentElement('afterend', actionsDiv);
          textarea.focus();

          const cleanup = () => {
            textarea.remove();
            actionsDiv.remove();
            textDiv.classList.remove('hidden');
          };

          saveBtn.onclick = () => {
            const newText = textarea.value.trim();
            if (!newText) { showToast('Entry cannot be empty.', 'error'); return; }
            const collectionName = getCollectionName(currentJournal);
            db.collection(collectionName).doc(entryId).update({ text: newText })
              .then(() => {
                showToast('Entry updated.', 'success');
                refreshEntries();
              })
              .catch(error => {
                console.error('Error updating entry:', error);
                showToast('Failed to update entry.', 'error');
                cleanup();
              });
          };

          cancelBtn.onclick = cleanup;
        }

        function showConfirmModal(message) {
          return new Promise(resolve => {
            const overlay = document.getElementById('modal-overlay');
            const msgEl = document.getElementById('modal-message');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            msgEl.textContent = message;
            overlay.style.display = 'flex';

            const cleanup = (result) => {
              overlay.style.display = 'none';
              confirmBtn.removeEventListener('click', onConfirm);
              cancelBtn.removeEventListener('click', onCancel);
              resolve(result);
            };

            const onConfirm = () => cleanup(true);
            const onCancel = () => cleanup(false);

            confirmBtn.addEventListener('click', onConfirm);
            cancelBtn.addEventListener('click', onCancel);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(false); }, { once: true });
          });
        }

        function deleteEntry(entryId) {
          const collectionName = getCollectionName(currentJournal);
          showConfirmModal('Are you sure you want to delete this entry?').then(confirmed => {
            if (!confirmed) return;
            db.collection(collectionName).doc(entryId).delete()
              .then(() => {
                showToast('Entry deleted.', 'info');
                refreshEntries();
              })
              .catch(error => {
                console.error('Error deleting entry:', error);
                showToast('Failed to delete entry.', 'error');
              });
          });
        }

        function togglePin(entryId, pinned) {
          const collectionName = getCollectionName(currentJournal);
            db.collection(collectionName).doc(entryId).update({ pinned })
              .then(() => {
                showToast(pinned ? 'Entry pinned to top.' : 'Entry unpinned.', 'info');
                refreshEntries();
              })
            .catch(error => {
              console.error('Error toggling pin:', error);
              showToast('Failed to update pin.', 'error');
            });
        }

        function exportEntries() {
          const collectionName = getCollectionName(currentJournal);
          db.collection(collectionName).where('userId', '==', currentUserUid).get()
            .then(snapshot => {
              const docs = [];
              snapshot.forEach(doc => docs.push(doc.data()));
              docs.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));
              let text = `Journal: ${currentJournal}\nExported: ${new Date().toLocaleDateString()}\n${'='.repeat(40)}\n\n`;
              docs.forEach(entry => {
                const date = entry.timestamp.toDate().toLocaleString();
                text += `[${date}]${entry.pinned ? ' 📌' : ''}\n${entry.text}\n${'-'.repeat(40)}\n\n`;
              });
              const blob = new Blob([text], { type: 'text/plain' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = `${currentJournal}-journal.txt`;
              a.click();
              URL.revokeObjectURL(a.href);
              showToast('Entries exported!', 'success');
            })
            .catch(error => {
              console.error('Error exporting entries:', error);
              showToast('Failed to export entries.', 'error');
            });
        }

        function refreshEntries() {
          const searchBar = document.getElementById('search-bar');
          const dateFilter = document.getElementById('date-filter');
          if (searchBar?.value.trim() || dateFilter?.value) {
            searchBar.dispatchEvent(new Event('input'));
          } else {
            loadEntries();
          }
        }

        function getCollectionName(journalName) {
          return journalName === 'primary' ? 'journalEntries' : `${journalName}JournalEntries`;
        }

        saveBtn.addEventListener('click', () => {
          if (saveBtn.classList.contains('spinning')) return;
          const text = journalEntry.value.trim();
          if (text === '') {
            showToast('Entry cannot be empty.', 'error');
            return;
          }

          saveBtn.classList.add('spinning');
          const timestamp = new Date();
          const collectionName = getCollectionName(currentJournal);

          const textToSave = journalEntry.value;
          db.collection(collectionName).add({ text, timestamp, userId: currentUserUid })
            .then(() => {
              saveBtn.classList.remove('spinning');
              journalEntry.value = '';
              showToast('Entry saved!', 'success');
              loadEntries();
            })
            .catch(error => {
              saveBtn.classList.remove('spinning');
              console.error('Error saving entry:', error);
              journalEntry.value = textToSave;
              showToast('Failed to save entry.', 'error');
            });
        });

        function loadUserJournals() {
          return db.collection('userJournals').get().then(snapshot => {
            snapshot.forEach(doc => {
              const data = doc.data();
              if (data.userId && data.userId !== currentUserUid) return;
              const journalName = data.name;
              createJournalTab(journalName, true);
              existingJournals.push(journalName.toLowerCase());
            });
          }).catch(error => console.error('Error loading journals:', error));
        }

        const TAB_LIGHT_START = 80;
        const TAB_LIGHT_STEP = 4;
        const TAB_DARK_START = 22;
        const TAB_DARK_STEP = 4;

        function assignTabColors() {
          const isDark = document.body.classList.contains('dark-theme');
          const tabs = document.querySelectorAll('#tabs-container .tab');
          tabs.forEach((tab, i) => {
            const shade = Math.round(isDark
              ? TAB_DARK_START + i * TAB_DARK_STEP
              : TAB_LIGHT_START - i * TAB_LIGHT_STEP);
            const sat = isDark ? 25 : 30;
            const activeSat = isDark ? 40 : 45;
            const hoverAdj = isDark ? 4 : -5;
            const activeAdj = isDark ? 8 : -8;
            tab.style.setProperty('--tab-bg', `hsl(28, ${sat}%, ${shade}%)`);
            tab.style.setProperty('--tab-bg-active', `hsl(28, ${activeSat}%, ${shade + activeAdj}%)`);
            tab.style.setProperty('--tab-bg-hover', `hsl(28, ${sat}%, ${shade + hoverAdj}%)`);
          });
        }

        function createJournalTab(journalName, skipColor) {
          const tab = document.createElement('div');
          tab.classList.add('tab');
          tab.textContent = journalName;
          tab.setAttribute('data-journal', journalName);
          tab.setAttribute('draggable', 'true');
          tab.setAttribute('title', journalName);

          addJournalBtn.insertAdjacentElement('beforebegin', tab);
          if (!skipColor) assignTabColors();
        }

        function enableTabDragging() {
          const tabsContainer = document.getElementById('tabs-container');
          let draggedTab = null;

          tabsContainer.addEventListener('dragstart', (event) => {
            const tab = event.target.closest('.tab');
            if (!tab) return;
            draggedTab = tab;
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', tab.id);
          });

          tabsContainer.addEventListener('dragover', (event) => {
            const tab = event.target.closest('.tab');
            if (!tab) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
          });

          let tabOrderTimeout;
          function saveTabOrder() {
            clearTimeout(tabOrderTimeout);
            tabOrderTimeout = setTimeout(() => {
              const order = Array.from(tabsContainer.querySelectorAll('.tab'))
                .map(t => t.getAttribute('data-journal'));
              if (userThemeDoc) {
                userThemeDoc.set({ tabOrder: order }, { merge: true });
              }
            }, 500);
          }

          tabsContainer.addEventListener('drop', (event) => {
            const tab = event.target.closest('.tab');
            if (!tab || !draggedTab || draggedTab === tab) return;
            event.preventDefault();
            const draggedIndex = Array.from(tabsContainer.children).indexOf(draggedTab);
            const targetIndex = Array.from(tabsContainer.children).indexOf(tab);
            if (draggedIndex < targetIndex) {
              tabsContainer.insertBefore(draggedTab, tab.nextSibling);
            } else {
              tabsContainer.insertBefore(draggedTab, tab);
            }
            saveTabOrder();
            assignTabColors();
          });

          tabsContainer.addEventListener('dragend', () => {
            draggedTab = null;
          });
        }

        function restoreTabOrder() {
          return userThemeDoc.get().then(doc => {
            if (doc.exists && doc.data().tabOrder) {
              const order = doc.data().tabOrder;
              const tabsContainer = document.getElementById('tabs-container');
              order.reverse().forEach(name => {
                const tab = tabsContainer.querySelector(`.tab[data-journal="${name}"]`);
                if (tab) {
                  tabsContainer.insertBefore(tab, tabsContainer.firstChild);
                }
              });
            }
          }).catch(() => {});
        }

        enableTabDragging();

        window.addEventListener('searchCleared', () => {
          if (entriesList) loadEntries();
        });

        dateFilter.addEventListener('change', refreshEntries);

        document.getElementById('tabs-container').addEventListener('click', (event) => {
          const tab = event.target.closest('.tab');
          if (tab) {
            switchJournal(tab.getAttribute('data-journal'));
          }
        });

        function showNewJournalForm() {
          document.getElementById('new-journal-form').style.display = 'flex';
          document.getElementById('new-journal-input').focus();
          addJournalBtn.style.display = 'none';
        }

        function hideNewJournalForm() {
          document.getElementById('new-journal-form').style.display = 'none';
          document.getElementById('new-journal-input').value = '';
          addJournalBtn.style.display = 'flex';
        }

        document.getElementById('menu-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          const menu = document.getElementById('dropdown-menu');
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        });

        document.addEventListener('click', (e) => {
          const container = document.getElementById('menu-container');
          if (container && !container.contains(e.target)) {
            document.getElementById('dropdown-menu').style.display = 'none';
          }
        });

        addJournalBtn.addEventListener('click', showNewJournalForm);

        document.getElementById('create-journal-btn').addEventListener('click', () => {
          let newJournalName = document.getElementById('new-journal-input').value.trim();
          if (!newJournalName) { showToast('Please enter a journal name.', 'error'); return; }

          newJournalName = newJournalName.replace(/[^a-zA-Z0-9 _-]/g, '');
          if (!newJournalName) { showToast('Journal name can only contain letters, numbers, spaces, hyphens, and underscores.', 'error'); return; }
          document.getElementById('new-journal-input').value = newJournalName;

          if (existingJournals.includes(newJournalName.toLowerCase())) {
            showToast('A journal with this name already exists.', 'error');
            return;
          }

          const createBtn = document.getElementById('create-journal-btn');
          createBtn.disabled = true;
          const originalBtnText = createBtn.textContent;
          createBtn.textContent = 'Creating...';

          db.collection('userJournals').doc(currentUserUid + '_' + newJournalName).set({ name: newJournalName, userId: currentUserUid })
            .then(() => {
              createJournalTab(newJournalName);
              hideNewJournalForm();
              switchJournal(newJournalName);
              existingJournals.push(newJournalName.toLowerCase());
              showToast(`Journal "${newJournalName}" created!`, 'success');
              createBtn.disabled = false;
              createBtn.textContent = originalBtnText;
            })
            .catch(error => {
              console.error('Error saving new journal:', error);
              showToast('Failed to create journal.', 'error');
              createBtn.disabled = false;
              createBtn.textContent = originalBtnText;
            });
        });

        document.getElementById('cancel-journal-btn').addEventListener('click', hideNewJournalForm);

        document.getElementById('new-journal-input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') document.getElementById('create-journal-btn').click();
          if (e.key === 'Escape') hideNewJournalForm();
        });

        deleteJournalBtn.addEventListener('click', function () {
          if (currentJournal === 'primary' || currentJournal === 'work') {
            showToast(`${currentJournal.charAt(0).toUpperCase() + currentJournal.slice(1)} journal cannot be deleted.`, 'error');
            return;
          }

          showConfirmModal(`Are you sure you want to delete the "${currentJournal}" journal? All entries will be lost.`).then(confirmed => {
            if (!confirmed) return;
            const journalCollection = getCollectionName(currentJournal);

            db.collection(journalCollection).get().then(snapshot => {
              const batch = db.batch();
              snapshot.forEach(doc => batch.delete(doc.ref));
              batch.delete(db.collection('userJournals').doc(currentUserUid + '_' + currentJournal));
              batch.delete(db.collection('userJournals').doc(currentJournal));
              batch.commit().then(() => {
                document.querySelector(`.tab[data-journal='${currentJournal}']`).remove();
                assignTabColors();
                existingJournals = existingJournals.filter(name => name !== currentJournal.toLowerCase());
                showToast(`Journal "${currentJournal}" deleted.`, 'info');
                switchJournal('primary');
              }).catch(error => {
                console.error(`Error deleting journal ${currentJournal}:`, error);
                showToast('Failed to delete journal.', 'error');
              });
            });
          });
        });

        window.addEditDeleteButtons = addEditDeleteButtons;
        window.editEntry = editEntry;
        window.deleteEntry = deleteEntry;
        window.togglePin = togglePin;
        window.currentUserUid = currentUserUid;
      });
    </script>

    <div id="toast-container"></div>

    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div class="modal">
        <div class="modal-message" id="modal-message"></div>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="modal-cancel-btn">Cancel</button>
          <button id="modal-confirm-btn" class="modal-confirm-btn">Delete</button>
        </div>
      </div>
    </div>

    <script src="js/search_functionality.js" defer></script>
  </body>
</html>
