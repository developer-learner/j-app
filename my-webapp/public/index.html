<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal App</title>

    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.14.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <!-- Link to CSS File -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <h1>My Journal</h1>
      <div class="tabs">
        <div id="primary-tab" class="tab active">Primary</div>
        <div id="work-tab" class="tab">Work</div>
      </div>
      <input type="text" id="search-bar" class="search-bar" placeholder="Search by text or date (e.g., 'Monday, Oct 17')">
      <div id="user-info" style="margin-bottom: 20px;"></div>
      <button id="logout-btn" class="logout-btn" style="display: none;">Log Out</button>
      <div class="entry-container">
        <textarea id="journalEntry" placeholder="Start typing your journal entry..."></textarea>
        <button id="save-btn" class="save-btn"><span class="arrow">&#11014;</span></button>
      </div>
      <ul id="entries" class="entry-list"></ul>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const auth = firebase.auth();
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const saveBtn = document.getElementById('save-btn');
        const journalEntry = document.getElementById('journalEntry');
        const primaryTab = document.getElementById('primary-tab');
        const workTab = document.getElementById('work-tab');
        let currentJournal = 'primary'; // Default journal is 'primary'

        // Switch between tabs
        primaryTab.addEventListener('click', () => switchJournal('primary'));
        workTab.addEventListener('click', () => switchJournal('work'));

        function switchJournal(journal) {
          currentJournal = journal;
          primaryTab.classList.toggle('active', journal === 'primary');
          workTab.classList.toggle('active', journal === 'work');
          loadEntries();
        }

        // Ensure only authenticated users can access the journal page
        auth.onAuthStateChanged(user => {
          if (!user) {
            // If no user is signed in, redirect to the login page
            window.location.href = 'login.html';
          } else {
            // Display logged-in user's email and show logout button
            userInfo.textContent = `Logged in as: ${user.email}`;
            logoutBtn.style.display = 'block';
          }
        });

        // Log out function
        logoutBtn.onclick = function () {
          auth.signOut().then(() => {
            window.location.href = 'login.html';
          }).catch(error => {
            console.error('Error signing out:', error);
          });
        };

        const db = firebase.firestore();

        // Save entry when button is clicked
        saveBtn.addEventListener('click', function () {
          saveEntry(journalEntry.value);
        });

        // Save entry to Firestore
        function saveEntry(text) {
          if (text.trim() === '') return;

          const timestamp = new Date();
          const collectionName = currentJournal === 'work' ? 'workJournalEntries' : 'journalEntries';
          db.collection(collectionName).add({
            text: text,
            timestamp: timestamp
          })
          .then(() => {
            console.log('Journal entry saved!');
            journalEntry.value = '';  // Clear the text area after save
            loadEntries();  // Refresh the list of entries
          })
          .catch(error => {
            console.error('Error saving entry:', error);
          });
        }

        // Load saved entries
        function loadEntries() {
          const collectionName = currentJournal === 'work' ? 'workJournalEntries' : 'journalEntries';
          db.collection(collectionName).orderBy('timestamp', 'desc').get()
          .then(snapshot => {
            const entriesList = document.getElementById('entries');
            entriesList.innerHTML = '';  // Clear the list
            let currentDay = '';

            snapshot.forEach(doc => {
              const entry = doc.data();
              const entryId = doc.id;
              const entryDate = entry.timestamp.toDate();

              // Format date for the banner (Monday, Oct 17)
              const dayString = entryDate.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
              });

              // Format time for the journal entry (12:34:30 PM)
              const timeString = entryDate.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: 'numeric',
                second: 'numeric',
                hour12: true
              });

              // Check if the current entry is on a new day, and add a new date header if needed
              if (currentDay !== dayString) {
                currentDay = dayString;
                const dayHeader = document.createElement('li');
                dayHeader.className = 'entry-day';
                dayHeader.textContent = currentDay;
                entriesList.appendChild(dayHeader);
              }

              // Add the journal entry under the date header
              const li = document.createElement('li');
              li.className = 'entry';
              li.innerHTML = `
                <div class="timestamp">${timeString}</div>
                <div class="entry-text">${entry.text}</div>
              `;

              addEditDeleteButtons(entryDate, li, entryId, entry);
              entriesList.appendChild(li);
            });
          });
        }

        // Add Edit and Delete buttons if entry is within 15 minutes of creation
        function addEditDeleteButtons(entryDate, li, entryId, entry) {
          const now = new Date();
          const timeDifference = (now - entryDate) / (1000 * 60); // difference in minutes
          if (timeDifference <= 15) {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'actions';
            
            const editButton = document.createElement('button');
            editButton.className = 'edit-btn';
            editButton.textContent = 'Edit';
            editButton.onclick = () => editEntry(entryId, entry.text);
            
            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-btn';
            deleteButton.textContent = 'Delete';
            deleteButton.onclick = () => deleteEntry(entryId);
            
            actionsDiv.appendChild(editButton);
            actionsDiv.appendChild(deleteButton);
            li.appendChild(actionsDiv);
          }
        }

        // Edit an entry
        function editEntry(entryId, currentText) {
          const collectionName = currentJournal === 'work' ? 'workJournalEntries' : 'journalEntries';
          const newText = prompt('Edit your entry:', currentText);
          if (newText !== null && newText.trim() !== '') {
            db.collection(collectionName).doc(entryId).update({
              text: newText
            })
            .then(() => {
              console.log('Entry updated!');
              loadEntries(); // Refresh entries after update
            })
            .catch(error => {
              console.error('Error updating entry:', error);
            });
          }
        }

        // Delete an entry
        function deleteEntry(entryId) {
          const collectionName = currentJournal === 'work' ? 'workJournalEntries' : 'journalEntries';
          if (confirm('Are you sure you want to delete this entry?')) {
            db.collection(collectionName).doc(entryId).delete()
            .then(() => {
              console.log('Entry deleted!');
              loadEntries(); // Refresh entries after delete
            })
            .catch(error => {
              console.error('Error deleting entry:', error);
            });
          }
        }

        // Initial load of entries
        loadEntries();
      });
    </script>
    <script src="js/search_functionality.js" defer></script>
  </body>
</html>
